version: 2
updates:
  # Maven project at the root
  - package-ecosystem: "maven"
    directories: 
    - "/"
    schedule:
      interval: "weekly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  # Maven project in the example-project directory
  - package-ecosystem: "maven"
    directories: 
    - "/example-project"
    schedule:
      interval: "weekly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  # Gradle project in the example-project-gradle directory
  - package-ecosystem: "gradle"
    directories: 
    - "/example-project-gradle"
    schedule:
      interval: "weekly"
    groups:
      all-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directories: 
    - "/"
    schedule:
      interval: "weekly"
